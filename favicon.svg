<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Mound eldritch eye">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="55%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#7a00ff"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="100%" stop-color="#05030a"/>
    </radialGradient>
  </defs>
  <!-- background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- mound silhouette -->
  <path d="M6 50 Q32 14 58 50 Z" fill="#0d0820" stroke="#7a00ff" stroke-width="1.5" opacity="0.7"/>
  <!-- eldritch eye -->
  <ellipse cx="32" cy="34" rx="18" ry="11" fill="#05030a" stroke="#00ffcc" stroke-width="1.5"/>
  <circle cx="32" cy="34" r="7" fill="url(#glow)"/>
  <circle cx="32" cy="34" r="2.6" fill="#05030a"/>
  <!-- glow highlight -->
  <circle cx="29.5" cy="31.5" r="1.4" fill="#ccfff5" opacity="0.9"/>
</svg>
